[Unit]
Description=Gunicorn OTP App
After=network.target

[Service]
User=www-data
Group=www-data
WorkingDirectory=/var/www/otp/backend
Environment="PATH=/var/www/otp/backend/venv/bin"
ExecStart=/var/www/otp/backend/venv/bin/gunicorn -w 3 -b 127.0.0.1:5000 app:app

[Install]
WantedBy=multi-user.target