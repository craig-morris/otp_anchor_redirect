<VirtualHost *:80>
    ServerName otp.organizationpremises.org

    ProxyPreserveHost On
    ProxyRequests Off
    RewriteEngine On

    # Static OTP landing page
    Alias /api/ /var/www/otp/static/api/
    <Directory /var/www/otp/static/api/>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.html
    </Directory>

    # Static owner dashboard
    Alias /dashboard/ /var/www/otp/static/dashboard/
    <Directory /var/www/otp/static/dashboard/>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.html
    </Directory>

    # Backend API routes
    ProxyPass /backend/ http://127.0.0.1:5000/
    ProxyPassReverse /backend/ http://127.0.0.1:5000/

    ErrorLog ${APACHE_LOG_DIR}/console-error.log
    CustomLog ${APACHE_LOG_DIR}/console-access.log combined

    RewriteCond %{SERVER_NAME} =otp.40nortlhadvocacy.com
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>